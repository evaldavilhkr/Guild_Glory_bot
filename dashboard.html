<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guild Glory System | Red-Green Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #080101; /* কালো লালচে ভাব */
            color: #f1f5f9;
            overflow-x: hidden;
            user-select: none;
        }

        /* BG Glow Animation - লাল ও সবুজ গ্লো */
        body::before {
            content: '';
            position: fixed;
            top: -10%; left: -10%;
            width: 45%; height: 45%;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.08), transparent);
            z-index: -1;
        }

        /* HERO SECTION */
        .hero {
            padding: 60px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #1a0505 0%, #080101 100%);
            border-bottom: 2px solid rgba(255, 0, 0, 0.2);
        }

        .logo {
            font-family: 'Rajdhani';
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 3px;
            /* লাল ও সবুজের শার্প গ্রেডিয়েন্ট */
            background: linear-gradient(90deg, #ff0000, #00ff00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            margin-bottom: 12px;
        }

        .tagline {
            font-family: 'Rajdhani';
            color: #00ff00; /* সবুজ ট্যাগলাইন */
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* STATUS BAR */
        .statusBox {
            display: flex;
            justify-content: space-around;
            padding: 14px;
            margin: -25px 20px 20px 20px;
            background: rgba(15, 0, 0, 0.9);
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 8px; /* একটু শার্প লুক */
            font-size: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(0, 255, 0, 0.1);
        }

        .live { color: #00ff00; font-weight: bold; text-shadow: 0 0 10px #00ff00; }

        /* FORM STYLING */
        .section { padding: 10px 25px 25px; }

        label { 
            font-size: 11px; 
            color: #b91c1c; /* লাল লেবেল */
            margin-left: 5px;
            font-weight: 600;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            margin-top: 8px;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid rgba(255, 0, 0, 0.2);
            background: #120202;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #00ff00; /* ফোকাস করলে সবুজ হবে */
            box-shadow: 0 0 12px rgba(0, 255, 0, 0.2);
            background: #1a0303;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 5px;
            font-family: 'Rajdhani';
            font-weight: bold;
            /* লাল গ্রেডিয়েন্ট বাটন */
            background: linear-gradient(135deg, #ff0000 0%, #990000 100%);
            color: white;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            box-shadow: 0 6px 20px rgba(0, 255, 0, 0.3);
            background: linear-gradient(135deg, #00ff00 0%, #008800 100%); /* হোভারে সবুজ হবে */
        }

        /* STATS CARDS */
        .statGrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 25px;
        }

        .statCard {
            background: #120202;
            padding: 20px 15px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 0, 0.1);
            text-align: center;
        }

        .statCard span { font-size: 11px; color: #94a3b8; display: block; }
        .number { color: #ff0000; font-size: 20px; font-weight: bold; font-family: 'Rajdhani'; }

        /* COMMENT BOX */
        .comments {
            margin: 25px;
            background: rgba(10, 0, 0, 0.8);
            border-radius: 8px;
            padding: 15px;
            height: 150px;
            overflow: hidden;
            border: 1px solid rgba(255, 0, 0, 0.1);
        }

        .commentItem {
            padding: 10px 0;
            font-size: 12px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.05);
            color: #cbd5e1;
        }

        /* LOADER OVERLAY */
        .loader {
            position: fixed;
            inset: 0;
            background: #080101;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 0, 0, 0.1);
            border-top: 4px solid #00ff00; /* সবুজ স্পিনার */
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="hero">
        <div class="logo">⚠ SYSTEM ACTIVE</div>
        <div class="tagline" id="tagText">MONITORING NETWORK...</div>
    </div>

    <div class="statusBox">
        <div>STATUS: <span class="live">ONLINE</span></div>
        <div>USERS: <span id="players" style="color:red">1,240</span></div>
    </div>

    <div class="section">
        <label>TARGET GUILD ID</label>
        <input type="tel" id="uid" maxlength="15" placeholder="Enter ID here...">

        <label>REGION ACCESS</label>
        <select id="country">
            <option value="">Choose Location</option>
            <option value="BD">Bangladesh</option>
            <option value="IN">India</option>
            <option value="BR">Brazil</option>
        </select>

        <button class="btn" onclick="startSystem()">EXECUTE COMMAND</button>
    </div>

    <div class="statGrid">
        <div class="statCard">
            <span style="color: #00ff00;">Active Nodes</span>
            <div class="number" id="bots">412</div>
        </div>
        <div class="statCard">
            <span style="color: #00ff00;">Security Level</span>
            <div class="number" style="color: #00ff00;">MAX</div>
        </div>
    </div>

    <div class="comments" id="commentsBox"></div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <h3 id="loadingText" style="font-family:Rajdhani; font-size:18px; color:#00ff00; margin-top:20px;">ACCESSING...</h3>
    </div>

    <script>
        // JavaScript অংশ একই রাখা হয়েছে, শুধু ফিড মেসেজের রঙ সবুজ করা হয়েছে
        const uidInput = document.getElementById("uid");
        uidInput.addEventListener("input", (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        function updateCounter(id, min, max) {
            setInterval(() => {
                let el = document.getElementById(id);
                if(!el) return;
                let val = parseInt(el.innerText.replace(',', ''));
                val += Math.floor(Math.random() * 5) * (Math.random() > 0.5 ? 1 : -1);
                el.innerText = Math.max(min, Math.min(max, val)).toLocaleString();
            }, 3000);
        }
        updateCounter("players", 1100, 1500);
        updateCounter("bots", 300, 600);

        const tags = ["Firewall Breach...", "Verifying Encryption...", "System Overload...", "Success!"];
        let tIdx = 0;
        setInterval(() => {
            document.getElementById("tagText").innerText = tags[tIdx];
            tIdx = (tIdx + 1) % tags.length;
        }, 2500);

        const feedBox = document.getElementById("commentsBox");
        setInterval(() => {
            const id = Math.floor(100000 + Math.random() * 900000);
            const div = document.createElement("div");
            div.className = "commentItem";
            div.innerHTML = `<span style="color:#00ff00">ACCESS:</span> ${id} - Linked`;
            feedBox.prepend(div);
            if(feedBox.children.length > 5) feedBox.removeChild(feedBox.lastChild);
        }, 2000);

        function startSystem() {
            if(uidInput.value.length < 5) { alert("Invalid ID"); return; }
            document.getElementById("loader").style.display = "flex";
            setTimeout(() => { 
                alert("Operation Complete!"); 
                document.getElementById("loader").style.display = "none";
            }, 4000);
        }
    </script>
</body>
</html>
