<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guild Glory System | Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #02040a;
            color: #e2e8f0;
            overflow-x: hidden;
            user-select: none; /* টেক্সট কপি করা বন্ধ রাখবে গেমারদের জন্য */
        }

        /* BG Glow Animation */
        body::before {
            content: '';
            position: fixed;
            top: -10%; left: -10%;
            width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.05), transparent);
            z-index: -1;
        }

        /* HERO SECTION */
        .hero {
            padding: 50px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #0b1430 0%, #02040c 100%);
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
        }

        .logo {
            font-family: 'Orbitron';
            font-size: 28px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00ffff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            margin-bottom: 12px;
        }

        .tagline {
            font-family: 'Orbitron';
            color: #22d3ee;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* STATUS BAR */
        .statusBox {
            display: flex;
            justify-content: space-around;
            padding: 12px;
            margin: 20px;
            background: rgba(7, 13, 37, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.05);
            border-radius: 50px;
            font-size: 12px;
            backdrop-filter: blur(5px);
        }

        .live { color: #22c55e; font-weight: bold; text-shadow: 0 0 5px #22c55e; }

        /* FORM STYLING */
        .section { padding: 0 25px 25px; }

        label { 
            font-size: 12px; 
            color: #94a3b8; 
            margin-left: 5px;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            margin-top: 8px;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 255, 0.1);
            background: #030a24;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            background: #050e2e;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron';
            font-weight: bold;
            background: linear-gradient(135deg, #00ffff 0%, #0066ff 100%);
            color: white;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
            transition: 0.3s;
        }

        .btn:active { transform: scale(0.98); }

        /* STATS CARDS */
        .statGrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 25px;
        }

        .statCard {
            background: #060c20;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-align: center;
        }

        .statCard span { font-size: 11px; color: #94a3b8; display: block; }
        .number { color: #22d3ee; font-size: 18px; font-weight: bold; margin-top: 5px; }

        /* COMMENT BOX */
        .comments {
            margin: 25px;
            background: #040816;
            border-radius: 15px;
            padding: 15px;
            height: 150px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 255, 0.05);
        }

        .commentItem {
            padding: 8px 0;
            font-size: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* LOADER OVERLAY */
        .loader {
            position: fixed;
            inset: 0;
            background: #01030a;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 255, 255, 0.1);
            border-top: 3px solid #00ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="hero">
    <div class="logo">GUILD GLORY</div>
    <div class="tagline" id="tagText">SYSTEM INITIALIZING...</div>
    </div>

    <div class="statusBox">
        <div>SERVER: <span class="live">SECURE</span></div>
        <div>ACTIVE: <span id="players">1,240</span></div>
    </div>

    <div class="section">
        <label>GUILD UID</label>
        <input type="tel" id="uid" maxlength="15" placeholder="Enter Guild UID (e.g. 10023456)">

        <label>REGION / COUNTRY</label>
        <select id="country">
            <option value="">Select Region</option>
            <option value="BD">🇧🇩 Bangladesh</option>
            <option value="IN">🇮🇳 India</option>
        </select>

        <button class="btn" onclick="startSystem()">CONNECT TO SERVER</button>
    </div>

    <div class="statGrid">
        <div class="statCard">
            <span>Global Bots</span>
            <div class="number" id="bots">412</div>
        </div>
        <div class="statCard">
            <span>Active Guilds</span>
            <div class="number" id="guilds">94</div>
        </div>
    </div>

    <div class="comments" id="commentsBox"></div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <h3 id="loadingText" style="font-family:Orbitron; font-size:14px; color:cyan;">CONNECTING...</h3>
    </div>

    <script>
        // UID input filtering
        const uidInput = document.getElementById("uid");
        uidInput.addEventListener("input", (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        // Dynamic Counters
        function updateCounter(id, min, max) {
            setInterval(() => {
                let val = parseInt(document.getElementById(id).innerText.replace(',', ''));
                val += Math.floor(Math.random() * 5) * (Math.random() > 0.5 ? 1 : -1);
                if(val < min) val = min;
                if(val > max) val = max;
                document.getElementById(id).innerText = val.toLocaleString();
            }, 3000);
        }

        updateCounter("players", 1100, 1500);
        updateCounter("bots", 300, 600);
        updateCounter("guilds", 80, 150);

        // Rotating Taglines
        const tags = ["Scanning AI Network...", "Bypassing Firewall...", "Syncing Glory Engine...", "Anti-Ban Shield Active"];
        let tIdx = 0;
        setInterval(() => {
            document.getElementById("tagText").innerText = tags[tIdx];
            tIdx = (tIdx + 1) % tags.length;
        }, 2500);

        // Enhanced Live Feed
        const feedMessages = ["connected to sync", "glory boost active", "security bypass success", "server link established"];
        const feedBox = document.getElementById("commentsBox");
        
        setInterval(() => {
            const id = Math.floor(100000 + Math.random() * 900000);
            const msg = feedMessages[Math.floor(Math.random() * feedMessages.length)];
            const div = document.createElement("div");
            div.className = "commentItem";
            div.innerHTML = `<span style="color:cyan">UID ${id}</span> - ${msg}`;
            feedBox.prepend(div);
            if(feedBox.children.length > 5) feedBox.removeChild(feedBox.lastChild);
        }, 2000);

        // System Start Logic
        function startSystem() {
            const uid = uidInput.value;
            const country = document.getElementById("country").value;

            if(uid.length < 5 || country === "") {
                alert("Please enter a valid UID and select your region.");
                return;
            }

            // Store Session
            localStorage.setItem("targetUID", uid);
            localStorage.setItem("region", country);

            const loader = document.getElementById("loader");
            const loadText = document.getElementById("loadingText");
            loader.style.display = "flex";

            const steps = ["SEARCHING GUILD...", "VERIFYING DATA...", "INJECTING PACKETS...", "FINALIZING..."];
            let sIdx = 0;

            const process = setInterval(() => {
                loadText.innerText = steps[sIdx];
                sIdx++;
                if(sIdx >= steps.length) {
                    clearInterval(process);
                    setTimeout(() => {
                        window.location.href = "home.html"; // নিশ্চিত করুন এই ফাইলটি আছে
                    }, 500);
                }
            }, 1000);
        }
    </script>
</body>
</html>
